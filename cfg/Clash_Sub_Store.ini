# ==================== Sub-Store 外部配置文件 ====================
# 将原来的 OpenClash 规则转换为 Sub-Store 格式

[common]
# 基础设置
append_proxy_type = true

# ==================== 策略组定义 ====================

# 主代理组
[[custom_groups]]
name = "Proxy"
type = "select"
rule = ["[]Auto-Test", "[]Optional", "[]🇭🇰 HK Node", "[]🇯🇵 JP Node", "[]🇸🇬 SG Node", "[]🇺🇸 US Node", "[]🇬🇧 UK Node", "[]🇩🇪 DE Node", ".*"]

[[custom_groups]]
name = "Optional"
type = "select"
rule = ["[]Global Direct", "[]🇭🇰 HK Node", "[]🇯🇵 JP Node", "[]🇸🇬 SG Node", "[]🇺🇸 US Node", "[]🇬🇧 UK Node", "[]🇩🇪 DE Node", ".*"]

[[custom_groups]]
name = "Auto-Test"
type = "url-test"
rule = [".*"]
url = "https://captive.apple.com/generate_204"
interval = 300
tolerance = 50

